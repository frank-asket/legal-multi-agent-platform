services:
  api:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8010
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
