services:
  api:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8010
        # Set in repo root `.env` (gitignored). Not stored in image layers; mounted as a build secret.
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY in .env}
      secrets:
        - clerk_secret
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

secrets:
  clerk_secret:
    environment: CLERK_SECRET_KEY
